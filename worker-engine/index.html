<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Raster para CAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Imagem para DXF</h1>
        <p class="text-gray-500 text-sm text-center mb-6">Envie uma planta ou rascunho (PNG/JPG)</p>
        
        <form id="uploadForm" class="space-y-4">
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition-colors">
                <input type="file" id="fileInput" accept="image/png, image/jpeg" class="hidden">
                <label for="fileInput" class="cursor-pointer flex flex-col items-center">
                    <svg class="w-10 h-10 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span class="text-gray-600 font-medium" id="fileName">Clique para selecionar</span>
                </label>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400">
                Converter para CAD
            </button>
        </form>

        <div id="loading" class="hidden mt-4 text-center">
            <p class="text-blue-600 font-medium animate-pulse">Processando vetores... aguarde.</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileName.textContent = e.target.files[0].name;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) {
                alert('Selecione um arquivo primeiro!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            submitBtn.disabled = true;
            loading.classList.remove('hidden');

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Cria um link temporário para forçar o download do arquivo retornado
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `convertido_${file.name.split('.')[0]}.dxf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert('Erro ao converter a imagem.');
                }
            } catch (error) {
                console.error(error);
                alert('Erro de comunicação com o servidor.');
            } finally {
                submitBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
